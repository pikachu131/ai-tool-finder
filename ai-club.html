<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 동호회 - AI 기초체력 키우기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
    <style>
        /* 기존 스타일 생략(원본 그대로 유지) */

        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6C5CE7;
            --accent: #00D2FF;
            --accent2: #A855F7;
            --darker: #080812;
            --card-bg: rgba(255,255,255,0.03);
            --card-border: rgba(255,255,255,0.08);
            --text: #E2E8F0;
            --text-muted: #94A3B8;
        }
        /* (생략) ... 원본 스타일 전체 복사 유지 ... */

        /* 외부 참여자 신청하기 버튼 숨김 처리 */
        .external-apply-btn {
            display: none !important;
        }
    </style>
</head>
<body>

<!-- (생략) 기존 콘텐츠도 그대로 유지 -->

<section class="cta-section" id="join">
    <div class="cta-box reveal">
        <div class="cta-content">
            <span class="cta-emoji">🎪</span>
            <h2>AI, 함께 <span class="gradient-text">시작</span>해볼까요?</h2>
            <p>완벽하지 않아도 괜찮습니다.<br>아무거나 하나, 일단 만들어보는 것부터 시작합시다!</p>
            <div class="cta-buttons">
                <div class="cta-btn-group">
                    <span class="cta-btn-label">외부 참여자</span>
                    <!-- 이 부분에 클래스명 external-apply-btn 추가 -->
                    <a href="https://forms.office.com/r/GDy4BUMp3W" target="_blank" rel="noopener noreferrer" class="btn-primary btn-outline external-apply-btn">✨신청하기</a>
                </div>
                <div class="cta-btn-group">
                    <span class="cta-btn-label">삼일/PwC 소속</span>
                    <a href="https://forms.office.com/r/GTwupp5imT" target="_blank" rel="noopener noreferrer" class="btn-primary btn-pwc">✨신청하기</a>
                </div>
                <a href="mailto:aigym@pwc.com" class="btn-secondary">📩 문의하기</a>
            </div>
        </div>
    </div>
</section>

<!-- (생략) 기존 스크립트 등도 그대로 유지 -->

<script>
    const revealEls = document.querySelectorAll('.reveal');
    function revealOnScroll() {
        revealEls.forEach(el => {
            if (el.getBoundingClientRect().top < window.innerHeight - 80) {
                el.classList.add('visible');
            }
        });
    }
    window.addEventListener('scroll', revealOnScroll);
    document.addEventListener('DOMContentLoaded', revealOnScroll);
    window.addEventListener('load', revealOnScroll);

    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
        navbar.classList.toggle('scrolled', window.scrollY > 50);
    });

    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('active');
    }

    function toggleFaq(el) {
        const item = el.parentElement;
        const isActive = item.classList.contains('active');
        document.querySelectorAll('.faq-item').forEach(f => f.classList.remove('active'));
        if (!isActive) item.classList.add('active');
    }

    document.querySelectorAll('a[href^="#"]').forEach(a => {
        a.addEventListener('click', function(e) {
            e.preventDefault();
            const t = document.querySelector(this.getAttribute('href'));
            if (t) t.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    });
</script>
</body>
</html>
